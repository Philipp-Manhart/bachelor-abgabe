repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format .
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: evaluation-pytest
        name: evaluation pytest
        entry: >
          bash -c 'uv run --package evaluation pytest;
          status=$?;
          if [ "$status" -eq 5 ]; then
            echo "No tests collected yet; allowing push until tests exist.";
            exit 0;
          fi;
          exit "$status"'
        language: system
        pass_filenames: false
        stages: [pre-push]
