[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = ["marimo>=0.10.19", "pre-commit>=4.0.0", "pytest>=9.0.0", "ruff>=0.14.0"]

[tool.ruff]
target-version = "py314"
line-length = 100
src = [
    "database",
    "notebooks",
    "packages/agent_orchestrator/src",
    "packages/evaluation/src",
    "packages/frontend/src",
    "packages/mcp_server/src",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
    "RUF",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
